# Cross-compilation to Windows (x86_64) from Linux using the mingw-w64 toolchain.
# gpui's Windows backend may not build under GNU/mingw (it targets MSVC); the
# data layer (zdb-db) cross-compiles cleanly here regardless.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"

# Windows on ARM64: gnullvm target via the llvm-mingw toolchain (clang + lld).
# `-static` statically links the llvm-mingw runtime (libc++/libunwind/libwinpthread)
# so the exe depends only on system DLLs — otherwise it needs libunwind.dll bundled.
[target.aarch64-pc-windows-gnullvm]
linker = "/home/tochk/.local/llvm-mingw/bin/aarch64-w64-mingw32-clang"
ar = "/home/tochk/.local/llvm-mingw/bin/llvm-ar"
rustflags = ["-C", "link-arg=-static"]
